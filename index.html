<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retroalimentación competencias clave</title>
    <script src="https://js.puter.com/v2/"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="container-fluid  ">
        <div class="row  h-100 mh-100">
            <div class="col-1 bg-primary  "></div>
            <div class="col-11">
                <header>
                    <img src="
                    https://cuatrovientos.org/wp-content/uploads/2025/01/LOGO-CENTRO-INTEGRADO-CUATROVIENTOS-300x115-2.png"
                        alt="Logo" style="height: 60px; margin-right: 20px;">
                </header>
                <main>
                    <div class="col-1 bg-primary"></div>
                    <div class="col-11 ">
                        <div class="row ">
                            <div class="col-10 mx-auto d-flex   align-items-center">
                                <div class="h-100 bg-primary mx-5" style="width: .7rem;"></div>

                                <h5 class="display-4 text-muted  ">RETROALIMENTACIÓN <span
                                        class="text-primary">COMPETENCIAS
                                        CLAVE </span></h5>

                            </div>
                        </div>
                        <div class="row h-100 mh-100 w-50 mx-auto">
                            <div id="form-container" class="col-12 my-5">

                                <form class="form">
                                    <div class="row">
                                        <div class="col-3 my-2">
                                            <select id="form-select" class="form-select">
                                                <option value="google/gemini-2.5-flash">Rápido</option>
                                                <option value="google/gemini-3-flash-preview" selected>Listo</option>
                                            </select>
                                        </div>
                                    </div>

                                    <textarea class="form-control" rows="10" cols="50"
                                        placeholder="Pegar resultados de las calificaciones obtenidas del excel de competencias clave (incluir cabecera!)"></textarea>
                                    <button class="my-5 btn btn-primary btn-lg btn-block "
                                        type="submit">Generar</button>
                                </form>

                                <div class="mx-auto bg-white">
                                    <ul id="results" class="list-group">

                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>

                </main>
            </div>

        </div>
    </div>


    <script>
const form = document.querySelector('form');
const resultsList = document.getElementById('results');

form.addEventListener('submit', async (event) => {
    event.preventDefault();
    const textarea = document.querySelector('textarea');
    const inputData = textarea.value.trim();

    if (!inputData) {
        alert("Por favor, pega los datos del Excel.");
        return;
    }

    // Estado de carga
    form.querySelector('button').disabled = true;
    const loadingMsg = document.createElement('div');
    loadingMsg.className = "alert alert-info";
    loadingMsg.innerHTML = "⏳ Generando feedback personalizado... por favor espera.";
    form.parentNode.insertBefore(loadingMsg, form.nextSibling);

    try {
        // Cargar el prompt
        const promptRes = await fetch('https://raw.githubusercontent.com/anderfrago/prompt-cc-feedback/refs/heads/deepseek/promt.toon');
        const promptText = await promptRes.text();

        // Llamada a Puter AI
        const resp = await puter.ai.chat(
            `${promptText}\n\nDatos de entrada (Excel):\n${inputData}`, 
            { 
                model: 'google/gemini-3-flash-preview', // Cambiado a Gemini 3 según disponibilidad
                responseMimeType: "application/json" 
            }
        );

        let rawAnswer = resp.text();
        
        // Limpieza robusta de JSON
        const jsonMatch = rawAnswer.match(/\[[\s\S]*\]|\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error("No se pudo encontrar un formato JSON válido en la respuesta.");
        
        const data = JSON.parse(jsonMatch[0]);
        const peopleList = Array.isArray(data) ? data : (data.json || data.alumnos);

        // Renderizar resultados
        loadingMsg.remove();
        form.style.display = 'none';

        peopleList.forEach(person => {
            // Construcción del cuerpo del mensaje profesional
            let emailBody = `${person.intro}\n\n`;
            
            person.competencias_evaluadas.forEach(comp => {
                emailBody += `📌 ${comp.nombre_competencia.toUpperCase()}\n`;
                emailBody += `Nota: ${comp.nota}\n`;
                emailBody += `Feedback: ${comp.rubrica}\n`;
                emailBody += `Sugerencia: ${comp.recomendaciones}\n\n`;
            });

            emailBody += `${person.conclusión}\n\nAtentamente,\nEl Equipo Docente.`;

            // Crear el enlace de Gmail
            const mailtoUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${person.email}&su=${encodeURIComponent("Feedback Competencias Clave")}&body=${encodeURIComponent(emailBody)}`;

            resultsList.innerHTML += `
                <li class="list-group-item d-flex align-items-center">
                    <input type="checkbox" class="me-3" style="width:20px; height:20px;">
                    <a href="${mailtoUrl}" target="_blank" class="btn btn-outline-primary btn-sm me-3">Enviar Mail</a>
                    <strong>${person.nombre}</strong> <span class="text-muted ms-2">(${person.email})</span>
                </li>`;
        });

    } catch (error) {
        console.error("Error detallado:", error);
        loadingMsg.className = "alert alert-danger";
        loadingMsg.innerText = "❌ Error: " + error.message;
        form.querySelector('button').disabled = false;
    }
});
    </script>
</body>

</html>
