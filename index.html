<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retroalimentación competencias clave</title>
    <script src="https://js.puter.com/v2/"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="sidebar-accent"></div>

    <div class="main-content">
        <header class="mb-5">
            <img src="https://cuatrovientos.org/wp-content/uploads/2025/01/LOGO-CENTRO-INTEGRADO-CUATROVIENTOS-300x115-2.png"
                alt="Logo" style="height: 60px;">
        </header>

        <main class="container-fluid">
            <div class="row">
                <div id="form-container" class="col-lg-8 mx-auto">
                    <div class="d-flex align-items-center mb-4">
                        <div class="bg-primary me-3" style="width: 8px; height: 50px;"></div>
                        <h2 class="display-6 text-muted">RETROALIMENTACIÓN <span class="text-primary fw-bold">COMPETENCIAS CLAVE</span></h2>
                    </div>

                    <form id="main-form" class="card shadow-sm p-4">
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="small text-muted">Precisión de la IA:</label>
                                <select id="form-select" class="form-select">
                                    <option value="google/gemini-2.5-flash">Rápido (Flash 2.5)</option>
                                    <option value="google/gemini-3-flash-preview" selected>Inteligente (Flash 3 Preview)</option>
                                </select>
                            </div>
                        </div>

                        <textarea class="form-control mb-4" rows="10" 
                            placeholder="Pega aquí las filas del Excel (incluye la cabecera)"></textarea>
                        
                        <button class="btn btn-primary btn-lg w-100" type="submit">Generar Informes</button>
                    </form>

                    <div id="loading-overlay" class="text-center my-5">
                        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
                        <h4 class="mt-3 text-primary">Redactando feedback...</h4>
                        <p class="text-muted">Gemini está analizando los niveles de competencia.</p>
                    </div>

                    <div id="results-container" class="mt-5" style="display:none;">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h4>Listado de Alumnos</h4>
                            <button onclick="window.location.reload()" class="btn btn-sm btn-outline-secondary">Nueva Consulta</button>
                        </div>
                        <ul id="results" class="list-group shadow-sm"></ul>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
    // Verificación inicial de conexión
    if (!navigator.onLine) {
        alert("No hay conexión a internet. La aplicación no podrá contactar con la IA.");
    }

    const form = document.getElementById('main-form');
    const loadingOverlay = document.getElementById('loading-overlay');
    const resultsContainer = document.getElementById('results-container');
    const resultsList = document.getElementById('results');

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        
        const textarea = form.querySelector('textarea');
        const inputData = textarea.value.trim();
        const modelDefinition = document.getElementById("form-select").value;

        if (!inputData) {
            alert("Por favor, introduce las calificaciones del Excel.");
            return;
        }

        // --- ESTADO DE CARGA ---
        form.style.display = 'none';
        loadingOverlay.style.display = 'block';
        resultsContainer.style.display = 'none';
        resultsList.innerHTML = ''; 

        try {
            // 1. Obtener el Prompt desde GitHub
            const promptUrl = 'https://raw.githubusercontent.com/cuatrovientos-ci/cc-feedback/refs/heads/main/prompt.toon';
            const promptResponse = await fetch(promptUrl);
            if (!promptResponse.ok) throw new Error("No se pudo cargar la configuración del prompt desde GitHub.");
            const promptText = await promptResponse.text();

            // 2. Autenticación con Puter
            await puter.auth.signIn();

            // 3. Llamada a la IA con Streaming
            let fullResponse = '';
            const resp = await puter.ai.chat(
                `${promptText}\n\nDatos para procesar:\n${inputData}`, 
                { 
                    model: modelDefinition, 
                    stream: true,
                    responseMimeType: "application/json"
                }
            );

            for await (const part of resp) {
                fullResponse += part?.text;
            }

            // 4. EXTRACCIÓN ROBUSTA DE JSON (Evita el error de "Unexpected character")
            // Buscamos donde empieza el JSON ({ o [) y donde termina (} o ])
            const startChar = fullResponse.indexOf('{') !== -1 && (fullResponse.indexOf('[') === -1 || fullResponse.indexOf('{') < fullResponse.indexOf('[')) ? '{' : '[';
            const endChar = startChar === '{' ? '}' : ']';
            
            const startIndex = fullResponse.indexOf(startChar);
            const endIndex = fullResponse.lastIndexOf(endChar);

            if (startIndex === -1 || endIndex === -1) {
                console.error("Respuesta cruda de la IA:", fullResponse);
                throw new Error("La IA no devolvió un formato de datos reconocible.");
            }

            const cleanJson = fullResponse.substring(startIndex, endIndex + 1);
            const parsedData = JSON.parse(cleanJson);
            
            // Normalizar la lista de alumnos
            const peopleList = parsedData.json ? parsedData.json : (Array.isArray(parsedData) ? parsedData : []);

            if (peopleList.length === 0) {
                throw new Error("No se encontraron datos de alumnos procesados.");
            }

            // 5. RENDERIZADO DE RESULTADOS
            loadingOverlay.style.display = 'none';
            resultsContainer.style.display = 'block';

            peopleList.forEach(person => {
                // Construcción del cuerpo del mensaje
                let emailBody = `${person.intro}\n\n`;
                
                if (person.competencias_evaluadas && Array.isArray(person.competencias_evaluadas)) {
                    person.competencias_evaluadas.forEach(comp => {
                        emailBody += `🔹 ${comp.nombre_competencia.trim().toUpperCase()}\n`;
                        emailBody += `   Calificación: ${comp.nota}\n`;
                        emailBody += `   Valoración: ${comp.rubrica}\n`;
                        emailBody += `   Sugerencia: ${comp.recomendaciones}\n\n`;
                    });
                }

                emailBody += `${person.conclusión}\n\nAtentamente,\nEl Equipo Docente de Cuatrovientos.\n\n`;
                emailBody += `Este feedback ha sido redactado con el apoyo de Inteligencia Artificial bajo la supervisión directa de tu profesor, garantizando una orientación personalizada basada en tus resultados reales.`;
                
                // Codificación segura para URL
                const subject = encodeURIComponent("Retroalimentación: Competencias Clave");
                const body = encodeURIComponent(emailBody);
                const mailtoUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${person.email || ''}&su=${subject}&body=${body}`;

                // Crear elemento visual
                const li = document.createElement('li');
                li.className = "list-group-item d-flex align-items-center p-3 shadow-sm mb-2 border rounded";
                li.innerHTML = `
                    <div class="form-check me-3">
                        <input class="form-check-input" type="checkbox" style="transform: scale(1.3);">
                    </div>
                    <div class="flex-grow-1">
                        <h6 class="mb-0 fw-bold">${person.nombre}</h6>
                        <small class="text-muted">${person.email || 'Sin email proporcionado'}</small>
                    </div>
                    <a href="${mailtoUrl}" target="_blank" class="btn btn-outline-danger btn-sm px-3">
                        Generar Gmail
                    </a>
                `;
                resultsList.appendChild(li);
            });

        } catch (error) {
            console.error("Error en el proceso:", error);
            loadingOverlay.style.display = 'none';
            form.style.display = 'block';
            alert("Error al procesar: " + error.message + "\n\nConsejo: Prueba a pegar menos alumnos a la vez.");
        }
    });
</script>
</body>
</html>
